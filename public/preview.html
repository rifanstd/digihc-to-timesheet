<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DigiHC to Timesheet — Preview</title>
    <style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-secondary: #c9d1d9;
    --text-hint: #8b949e;
    --accent: #58a6ff;
    --btn-primary: #1f6feb;
    --btn-primary-hover: #388bfd;
    --btn-primary-active: #1158c7;
    --input-bg: #1c2128;
    --btn-primary-text: #ffffff;
    --btn-success: #238636;
    --btn-success-hover: #2ea043;
    --btn-success-active: #196c2e;
    --btn-success-text: #ffffff;
    --btn-disabled-bg: #21262d;
    --btn-disabled-text: #666e79;
    --error: #f85149;
    --info: #d29922;
    --success: #3fb950;
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-pill: 24px;
  }

  *, *::before, *::after {
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 24px;
    font-size: 15px;
    line-height: 1.4;
  }

  #backLink {
    display: inline-block;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.85rem;
    margin-bottom: 24px;
    transition: color 150ms ease;
  }

  #backLink:hover {
    color: var(--accent);
  }

  h1 {
    font-size: 1.15rem;
    color: var(--text);
    margin: 0 0 24px;
    font-weight: 600;
  }

  /* Metadata form card */
  #metadataForm {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 20px 24px;
    display: grid;
    grid-template-columns: 180px 1fr 140px 1fr;
    gap: 14px 16px;
    margin-bottom: 16px;
    align-items: center;
  }

  #metadataForm label {
    color: var(--text-secondary);
    font-size: 0.82rem;
    margin: 0;
  }

  #metadataForm input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 0 12px;
    height: 40px;
    color: var(--text);
    font-size: 0.85rem;
    width: 100%;
    transition: border-color 150ms ease, box-shadow 150ms ease;
  }

  #metadataForm input:focus {
    border-color: var(--accent);
    outline: none;
    box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.3);
  }

  #metadataForm input::placeholder {
    color: var(--text-hint);
  }

  /* Hint paragraph */
  #hintP {
    color: var(--text-hint);
    font-size: 0.82rem;
    margin: 0 0 8px;
  }

  /* Divisi/Departement row */
  #divDepRow {
    display: grid;
    grid-template-columns: 100px 1fr 120px 1fr;
    gap: 14px 16px;
    margin-bottom: 24px;
    align-items: center;
  }

  #divDepRow label {
    color: var(--text-secondary);
    font-size: 0.82rem;
    margin: 0;
  }

  #divDepRow input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 0 12px;
    height: 40px;
    color: var(--text);
    font-size: 0.85rem;
    width: 100%;
    transition: border-color 150ms ease, box-shadow 150ms ease;
  }

  #divDepRow input:focus {
    border-color: var(--accent);
    outline: none;
    box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.3);
  }

  #inputFilename {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 0 12px;
    height: 40px;
    color: var(--text);
    font-size: 0.85rem;
    width: 100%;
    margin-bottom: 16px;
    transition: border-color 150ms ease, box-shadow 150ms ease;
  }

  #inputFilename:focus {
    border-color: var(--accent);
    outline: none;
    box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.3);
  }

  #inputFilename::placeholder {
    color: var(--text-hint);
  }

  #inputSignDate {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 0 12px;
    height: 40px;
    color: var(--text);
    font-size: 0.85rem;
    width: 100%;
    margin-bottom: 16px;
    transition: border-color 150ms ease, box-shadow 150ms ease;
  }

  #inputSignDate:focus {
    border-color: var(--accent);
    outline: none;
    box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.3);
  }

  #inputSignDate::placeholder {
    color: var(--text-hint);
  }

  /* Activity table */
  #activityTable {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    font-size: 0.85rem;
  }

  #activityTable thead {
    position: sticky;
    top: 0;
    z-index: 2;
  }

  #activityTable th {
    background: var(--surface);
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  #activityTable th:first-child {
    border-top-left-radius: var(--radius-md);
  }

  #activityTable th:last-child {
    border-top-right-radius: var(--radius-md);
  }

  #activityTable td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: middle;
  }

  #activityTable tbody tr:nth-child(odd) td {
    background: var(--bg);
  }

  #activityTable tbody tr:nth-child(even) td {
    background: var(--surface);
  }

  /* Status badges */
  .status-H {
    color: var(--success) !important;
    font-weight: 600;
  }

  .status-LIB {
    color: var(--text-hint) !important;
  }

  .status-TK {
    color: var(--error) !important;
    font-weight: 600;
  }

  .status-S {
    color: var(--error) !important;
    font-weight: 600;
  }

  .status-none {
    color: var(--text-hint) !important;
  }

  /* Inline table inputs */
  .activity-input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0 8px;
    height: 36px;
    color: var(--text);
    font-size: 0.85rem;
    transition: border-color 150ms ease;
    box-sizing: border-box;
  }

  .activity-input:focus {
    border-color: var(--accent);
    outline: none;
    box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.3);
  }

  .invalid {
    border-color: var(--error) !important;
    box-shadow: 0 0 0 2px rgba(248, 81, 73, 0.3) !important;
  }

  /* Download button */
  #downloadBtn {
    display: block;
    width: 100%;
    height: 48px;
    border: none;
    border-radius: var(--radius-pill);
    background: var(--btn-success);
    color: var(--btn-success-text);
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 24px;
    transition: background-color 150ms ease;
    appearance: none;
  }

  #downloadBtn:hover {
    background: var(--btn-success-hover);
  }

  #downloadBtn:active {
    background: var(--btn-success-active);
  }

  #downloadBtn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  #downloadBtn:disabled {
    background: var(--btn-disabled-bg);
    color: var(--btn-disabled-text);
    cursor: not-allowed;
    opacity: 1;
  }

  #status {
    margin-top: 14px;
    font-size: 0.85rem;
    color: var(--text);
    min-height: 20px;
    text-align: center;
  }

  #status.error { color: var(--error); }
  #status.success { color: var(--success); }
  #status.info { color: var(--info); }

  /* Responsive */
  @media (max-width: 600px) {
    body { padding: 16px; }

    #metadataForm {
      grid-template-columns: 1fr;
      gap: 6px;
      padding: 16px;
    }

    #divDepRow {
      grid-template-columns: 1fr;
      gap: 6px;
    }

    #activityTable th:nth-child(2),
    #activityTable td:nth-child(2),
    #activityTable th:nth-child(3),
    #activityTable td:nth-child(3),
    #activityTable th:nth-child(6),
    #activityTable td:nth-child(6),
    #activityTable th:nth-child(7),
    #activityTable td:nth-child(7),
    #activityTable th:nth-child(8),
    #activityTable td:nth-child(8),
    #activityTable th:nth-child(9),
    #activityTable td:nth-child(9) {
      display: none;
    }
  }
    </style>
  </head>
  <body>
    <a id="backLink" href="/">← Back to Home</a>
    <h1>DigiHC Attendance → Timesheet</h1>

    <div id="metadataForm">
      <label for="inputProjectName">Project Name</label>
      <input type="text" id="inputProjectName" />

      <label for="inputUnit">Unit / Divisi</label>
      <input type="text" id="inputUnit" />

      <label for="inputSite">SITE</label>
      <input type="text" id="inputSite" />

      <label for="inputName">Nama</label>
      <input type="text" id="inputName" />

      <label for="inputMiiId">MII ID</label>
      <input type="text" id="inputMiiId" />

      <label for="inputManagerName">Nama Manager (Diperiksa Oleh)</label>
      <input type="text" id="inputManagerName" />

      <label for="inputDeptHeadName">Nama Kepala Departemen (Disetujui Oleh)</label>
      <input type="text" id="inputDeptHeadName" />
      <span></span><span></span>
    </div>

    <p id="hintP">Isi Divisi dan Departement untuk mengisi kolom terkait di setiap baris timesheet.</p>
    <div id="divDepRow">
      <label for="inputDivisi">Divisi</label>
      <input type="text" id="inputDivisi" />

      <label for="inputDepartement">Departement</label>
      <input type="text" id="inputDepartement" />
    </div>

    <h2 style="font-size: 1rem; color: var(--text); margin: 0 0 14px; font-weight: 600;">Aktivitas Harian</h2>
    <table id="activityTable">
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Check-in</th>
          <th>Check-out</th>
          <th>Status</th>
          <th>Aktivitas</th>
          <th>Project Name</th>
          <th>Project ID</th>
          <th>Aplikasi Terdampak</th>
          <th>AIP Fitur</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <label for="inputFilename">Nama File</label>
    <input type="text" id="inputFilename" />
    <label for="inputSignDate">Tanggal Penandatanganan</label>
    <input type="date" id="inputSignDate" />
    <button id="downloadBtn">Download Timesheet</button>
    <div id="status"></div>

    <script>
      const CACHE_ID = window.location.pathname.split('/').pop();
      const PREVIEW = window.__PREVIEW_DATA__;

      const statusEl = document.getElementById("status");
      const downloadBtn = document.getElementById("downloadBtn");

      function setStatus(msg, cls) {
        statusEl.textContent = msg;
        statusEl.className = cls || "";
      }

      function renderTable(data) {
        const tbody = document.querySelector("#activityTable tbody");
        tbody.innerHTML = "";

        document.getElementById('inputProjectName').value = data.defaults?.projectName || '';
        document.getElementById('inputSite').value = data.defaults?.site || '';
        document.getElementById('inputName').value = data.metadata?.name || '';
        const nameVal = document.getElementById('inputName').value.trim();
        const mo = data.month.month;
        const year = data.month.year;
        const indoMonths = ['Januari','Februari','Maret','April','Mei','Juni',
                            'Juli','Agustus','September','Oktober','November','Desember'];
        if (nameVal) {
          document.getElementById('inputFilename').value = nameVal + '-' + indoMonths[mo] + '-' + year + '-Timesheet.xlsx';
        } else {
          document.getElementById('inputFilename').value = 'timesheet-filled.xlsx';
        }
        const statusLabels = {
          H: "Hadir",
          LIB: "Libur",
          TK: "Tanpa Keterangan",
          S: "Sakit",
        };

        for (const row of data.rows) {
          const tr = document.createElement("tr");

          const tdDate = document.createElement("td");
          tdDate.textContent = row.date;

          const tdIn = document.createElement("td");
          if (row.checkIn) {
            tdIn.textContent = row.checkIn.substring(0, 5);
          } else {
            tdIn.textContent = "---";
            tdIn.style.textAlign = "center";
          }

          const tdOut = document.createElement("td");
          if (row.checkOut) {
            tdOut.textContent = row.checkOut.substring(0, 5);
          } else {
            tdOut.textContent = "---";
            tdOut.style.textAlign = "center";
          }

          const tdStatus = document.createElement("td");
          if (statusLabels[row.status]) {
            tdStatus.textContent = statusLabels[row.status];
          } else {
            tdStatus.textContent = "---";
            tdStatus.style.textAlign = "center";
          }
          tdStatus.className = "status-" + (row.status || "none");

          const tdAct = document.createElement("td");
          if (row.status === "H") {
            const input = document.createElement("input");
            input.type = "text";
            input.className = "activity-input";
            input.value = row.activity || "";
            input.dataset.serial = row.serial;
            tdAct.appendChild(input);
          } else {
            if (row.status === "S") {
              tdAct.textContent = "Sakit";
            } else if (row.status === "LIB" && row.activity) {
              tdAct.textContent = row.activity;
            } else if (row.status === "TK") {
              tdAct.textContent = "Tanpa Keterangan";
            } else {
              tdAct.textContent = "---";
              tdAct.style.textAlign = "center";
            }
          }

          const tdProjName = document.createElement("td");
          if (row.status === "H") {
            const input = document.createElement("input");
            input.type = "text";
            input.className = "activity-input";
            input.dataset.serial = row.serial;
            input.dataset.field = "projectName";
            tdProjName.appendChild(input);
          } else {
            tdProjName.textContent = "---";
            tdProjName.style.textAlign = "center";
          }

          const tdProjId = document.createElement("td");
          if (row.status === "H") {
            const input = document.createElement("input");
            input.type = "text";
            input.className = "activity-input";
            input.dataset.serial = row.serial;
            input.dataset.field = "projectId";
            tdProjId.appendChild(input);
          } else {
            tdProjId.textContent = "---";
            tdProjId.style.textAlign = "center";
          }

          const tdAffected = document.createElement("td");
          if (row.status === "H") {
            const input = document.createElement("input");
            input.type = "text";
            input.className = "activity-input";
            input.dataset.serial = row.serial;
            input.dataset.field = "affectedApp";
            tdAffected.appendChild(input);
          } else {
            tdAffected.textContent = "---";
            tdAffected.style.textAlign = "center";
          }

          const tdAip = document.createElement("td");
          if (row.status === "H") {
            const input = document.createElement("input");
            input.type = "text";
            input.className = "activity-input";
            input.dataset.serial = row.serial;
            input.dataset.field = "aipFeature";
            tdAip.appendChild(input);
          } else {
            tdAip.textContent = "---";
            tdAip.style.textAlign = "center";
          }

          tr.appendChild(tdDate);
          tr.appendChild(tdIn);
          tr.appendChild(tdOut);
          tr.appendChild(tdStatus);
          tr.appendChild(tdAct);
          tr.appendChild(tdProjName);
          tr.appendChild(tdProjId);
          tr.appendChild(tdAffected);
          tr.appendChild(tdAip);
          tbody.appendChild(tr);
        }
      }

      downloadBtn.addEventListener("click", async () => {
        const requiredFields = [
          { id: 'inputProjectName' },
          { id: 'inputUnit' },
          { id: 'inputSite' },
          { id: 'inputName' },
          { id: 'inputMiiId' },
          { id: 'inputManagerName' },
          { id: 'inputDeptHeadName' },
          { id: 'inputDivisi' },
          { id: 'inputDepartement' },
          { id: 'inputSignDate' }
        ];

        let hasEmpty = false;
        for (const field of requiredFields) {
          const el = document.getElementById(field.id);
          if (el && !el.value.trim()) {
            el.classList.add('invalid');
            hasEmpty = true;
          } else if (el) {
            el.classList.remove('invalid');
          }
        }

        if (hasEmpty) {
          setStatus("Harap isi semua field yang wajib.", "error");
          return;
        }

        const activitiesMap = new Map();
        document.querySelectorAll(".activity-input").forEach((input) => {
          const serial = parseInt(input.dataset.serial);
          if (!activitiesMap.has(serial)) {
            activitiesMap.set(serial, { serial });
          }
          const entry = activitiesMap.get(serial);
          const field = input.dataset.field || "activity";
          if (input.value.trim()) {
            entry[field] = input.value.trim();
          }
        });

        PREVIEW.rows.forEach((row) => {
          if (row.status === "S") {
            if (!activitiesMap.has(row.serial)) {
              activitiesMap.set(row.serial, { serial: row.serial });
            }
            activitiesMap.get(row.serial).activity = "Sakit";
          }
        });

        const activities = Array.from(activitiesMap.values()).filter(
          (a) => a.activity || a.projectName || a.projectId || a.affectedApp || a.aipFeature
        );

        const headerFields = {
          projectName: document.getElementById('inputProjectName').value.trim(),
          site: document.getElementById('inputSite').value.trim(),
          unit: document.getElementById('inputUnit').value.trim(),
          name: document.getElementById('inputName').value.trim(),
          miiId: document.getElementById('inputMiiId').value.trim(),
          managerName: document.getElementById('inputManagerName').value.trim(),
          deptHeadName: document.getElementById('inputDeptHeadName').value.trim()
        };

        const rowFields = {
          divisi: document.getElementById('inputDivisi').value.trim(),
          departement: document.getElementById('inputDepartement').value.trim()
        };

        let signDate = null;
        const signDateEl = document.getElementById('inputSignDate');
        if (signDateEl && signDateEl.value) {
          const [y, m, d] = signDateEl.value.split('-');
          const indoMonths = ['Januari','Februari','Maret','April','Mei','Juni',
                              'Juli','Agustus','September','Oktober','November','Desember'];
          signDate = parseInt(d, 10) + ' ' + indoMonths[parseInt(m, 10) - 1] + ' ' + y;
        }

        setStatus("Mengunduh...", "info");
        downloadBtn.disabled = true;

        try {
          const data = new FormData();
          data.append("activities", JSON.stringify(activities));
          data.append('headerFields', JSON.stringify(headerFields));
          data.append('rowFields', JSON.stringify(rowFields));
          if (signDate) data.append('signatureDate', signDate);

          const res = await fetch("/convert/" + CACHE_ID, { method: "POST", body: data });

          if (!res.ok) {
            const err = await res.json();
            setStatus("Error: " + (err.error || "Unknown error"), "error");
            return;
          }

          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          const filename = document.getElementById('inputFilename').value.trim() || 'timesheet-filled.xlsx';
          a.download = filename;
          a.click();
          URL.revokeObjectURL(url);

          setStatus("Download dimulai!", "success");
        } catch (err) {
          setStatus("Error: " + err.message, "error");
        } finally {
          downloadBtn.disabled = false;
        }
      });

      if (PREVIEW) {
        renderTable(PREVIEW);
      } else {
        setStatus("Data tidak tersedia. Silakan unggah ulang.", "error");
      }
    </script>
  </body>
</html>
