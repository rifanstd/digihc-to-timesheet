<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DigiHC to Timesheet</title>
    <style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-secondary: #c9d1d9;
    --text-hint: #8b949e;
    --accent: #58a6ff;
    --btn-primary: #1f6feb;
    --btn-primary-hover: #388bfd;
    --btn-primary-active: #1158c7;
    --btn-primary-text: #ffffff;
    --btn-success: #238636;
    --btn-success-hover: #2ea043;
    --btn-success-active: #196c2e;
    --btn-success-text: #ffffff;
    --btn-disabled-bg: #21262d;
    --btn-disabled-text: #666e79;
    --error: #f85149;
    --info: #d29922;
    --success: #3fb950;
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-pill: 24px;
  }

  *, *::before, *::after {
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 40px 24px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    line-height: 1.4;
  }

  h1 {
    font-size: 1.25rem;
    color: var(--text);
    margin: 0 0 36px;
    font-weight: 600;
    text-align: center;
  }

  #uploadSection {
    max-width: 420px;
    width: 100%;
    background: var(--surface);
    border-radius: var(--radius-md);
    padding: 32px 28px;
  }

  #uploadSection > label {
    display: block;
    color: var(--text-secondary);
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 0 0 6px;
  }

  #uploadSection input[type="file"] {
    display: block;
    width: 100%;
    color: var(--text);
    font-size: 0.85rem;
    margin-bottom: 24px;
  }

  #uploadSection input[type="file"]::file-selector-button {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 500;
    margin-right: 12px;
    transition: border-color 150ms ease, color 150ms ease;
  }

  #uploadSection input[type="file"]::file-selector-button:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  #previewBtn {
    display: block;
    width: 100%;
    height: 48px;
    border: none;
    border-radius: var(--radius-pill);
    background: var(--btn-primary);
    color: var(--btn-primary-text);
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 150ms ease;
    appearance: none;
  }

  #previewBtn:hover {
    background: var(--btn-primary-hover);
  }

  #previewBtn:active {
    background: var(--btn-primary-active);
  }

  #previewBtn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  #previewBtn:disabled {
    background: var(--btn-disabled-bg);
    color: var(--btn-disabled-text);
    cursor: not-allowed;
    opacity: 1;
  }

  #status {
    margin-top: 14px;
    font-size: 0.85rem;
    color: var(--text);
    min-height: 20px;
    text-align: center;
  }

  #status.error { color: var(--error); }
  #status.success { color: var(--success); }
  #status.info { color: var(--info); }

  @media (max-width: 600px) {
    body { padding: 20px 16px; }
    h1 { font-size: 1.1rem; margin-bottom: 24px; }
    #uploadSection { padding: 24px 18px; }
  }
    </style>
  </head>
  <body>
    <h1>DigiHC Attendance → Timesheet</h1>

    <div id="uploadSection">
      <label for="pdf">DigiHC Attendance PDF</label>
      <input type="file" id="pdf" name="pdf" accept=".pdf" required />

      <label for="template">Timesheet Template (XLSX)</label>
      <input type="file" id="template" name="template" accept=".xlsx" required />

      <button id="previewBtn">Preview Data</button>
      <div id="status"></div>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      const previewBtn = document.getElementById("previewBtn");

      function setStatus(msg, cls) {
        statusEl.textContent = msg;
        statusEl.className = cls || "";
      }

      previewBtn.addEventListener("click", async () => {
        const pdfFile = document.getElementById("pdf").files[0];
        const templateFile = document.getElementById("template").files[0];

        if (!pdfFile || !templateFile) {
          setStatus("Pilih file PDF dan template terlebih dahulu.", "error");
          return;
        }

        setStatus("Memproses...", "info");
        previewBtn.disabled = true;

        try {
          const data = new FormData();
          data.append("pdf", pdfFile);
          data.append("template", templateFile);

          const res = await fetch("/preview", { method: "POST", body: data });

          if (res.redirected) {
            window.location.href = res.url;
            return;
          }

          const err = await res.json();
          setStatus("Error: " + (err.error || "Unknown error"), "error");
        } catch (err) {
          setStatus("Error: " + err.message, "error");
        } finally {
          previewBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
